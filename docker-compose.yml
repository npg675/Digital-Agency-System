version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: landingforge_db
    environment:
      POSTGRES_USER: landingforge
      POSTGRES_PASSWORD: password
      POSTGRES_DB: landingforge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: landingforge_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://landingforge:password@postgres:5432/landingforge_dev
      - SECRET_KEY=supersecretkey_change_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: landingforge_frontend
    ports:
      - "3000:3000"
    environment:
      # In production, this should point to your domain. If using nginx proxy, it might be /api/v1 or https://yourdomain.com/api/v1
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: landingforge_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
