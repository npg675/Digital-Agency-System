version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: landingforge_db
    environment:
      POSTGRES_USER: landingforge
      POSTGRES_PASSWORD: password
      POSTGRES_DB: landingforge_dev
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: landingforge_backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://landingforge:password@postgres:5432/landingforge_dev
      - SECRET_KEY=supersecretkey_change_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your_google_client_id_here}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your_google_client_secret_here}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/calendar/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key_here}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: landingforge_frontend
    ports:
      - "3001:3001"
    environment:
      # In production, this should point to your domain. If using nginx proxy, it might be /api/v1 or https://yourdomain.com/api/v1
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: landingforge_nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
